name: Format

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format 21
        run: |
          sudo apt-get update
          sudo apt-get install -y wget software-properties-common lsb-release
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y clang-format-21

      - name: Check formatting (backend only)
        run: |
          FILES=$(find backend -type f \( -name "*.cpp" -o -name "*.h" \))
          if [ -n "$FILES" ]; then
            clang-format-21 --dry-run --Werror $FILES
          fi